---
name: Build PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    environment:
      name: pr-build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          allow-unsafe-pr-checkout: true

      - name: Set variables
        run: |
          echo "PR_NUMBER=${{ github.event.pull_request.number || github.run_number }}" >> $GITHUB_ENV
          echo "REGISTRY_LOWER=$(echo '${{ env.REGISTRY }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "REPOSITORY_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      # Build Docker Images (amd64 and arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ${{ env.REGISTRY_LOWER }}/${{ env.REPOSITORY_LOWER }}-pr
          tags: |
            type=raw,value=${{ env.PR_NUMBER }}
          labels: |
            org.opencontainers.image.authors="Open Home Foundation"
            org.opencontainers.image.base.name="docker.io/library/python:3.13-slim-trixie"
            org.opencontainers.image.description="Linux-Voice-Assistant for Home Assistant"
            org.opencontainers.image.documentation="https://github.com/OHF-Voice/linux-voice-assistant/blob/main/README.md"
            org.opencontainers.image.licenses="Apache-2.0"
            org.opencontainers.image.source="https://github.com/OHF-Voice/linux-voice-assistant"
            org.opencontainers.image.title="Linux-Voice-Assistant"
            org.opencontainers.image.url="https://github.com/OHF-Voice/linux-voice-assistant"
            org.opencontainers.image.vendor="Open Home Foundation"

      - name: Create version files
        run: |
          echo "${{ env.PR_NUMBER }}" > version.txt
          echo "${{ github.sha }}" > version_githash.txt
          ls -ltr

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/aarch64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_LOWER }}/${{ env.REPOSITORY_LOWER }}-pr
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
